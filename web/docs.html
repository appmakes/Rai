<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rai — Documentation</title>
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="docs-page">
    <nav class="docs-sidebar">
      <a href="index.html" class="docs-back">
        <!-- Lucide: arrow-left -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Back
      </a>
      <div class="docs-nav-title">Documentation</div>
      <ul class="docs-nav-list">
        <li><a href="#user_guide" class="doc-link active" data-doc="user_guide">User Guide</a></li>
        <li><a href="#model_provider_config" class="doc-link" data-doc="model_provider_config">Model &amp; Provider Config</a></li>
      </ul>
    </nav>
    <main class="docs-content" id="docs-content">
      <p class="docs-loading">Loading documentation...</p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const docs = {
      user_guide: { file: 'doc/guide/user_guide.md', title: 'User Guide' },
      model_provider_config: { file: 'doc/guide/model_provider_config.md', title: 'Model & Provider Config' }
    };

    const content = document.getElementById('docs-content');
    const links = document.querySelectorAll('.doc-link');

    async function loadDoc(key) {
      const doc = docs[key];
      if (!doc) return;

      // Update active link
      links.forEach(l => l.classList.remove('active'));
      const activeLink = document.querySelector(`[data-doc="${key}"]`);
      if (activeLink) activeLink.classList.add('active');

      // Update title
      document.title = `Rai — ${doc.title}`;

      // Fetch and render
      content.innerHTML = '<p class="docs-loading">Loading...</p>';
      try {
        const res = await fetch(doc.file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        content.innerHTML = marked.parse(md);
      } catch (e) {
        content.innerHTML = `<p class="docs-loading">Failed to load ${doc.title}. Make sure you're viewing this on the deployed site.</p>`;
      }
    }

    // Handle hash navigation
    function onHashChange() {
      const hash = location.hash.slice(1) || 'user_guide';
      loadDoc(hash);
    }

    window.addEventListener('hashchange', onHashChange);

    // Handle link clicks
    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const key = link.dataset.doc;
        history.pushState(null, '', `#${key}`);
        loadDoc(key);
      });
    });

    // Initial load
    onHashChange();
  </script>
</body>
</html>
