<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rai — Documentation</title>
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="docs-page">
    <nav class="docs-sidebar">
      <a href="index.html" class="docs-back">
        <!-- Lucide: arrow-left -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Back
      </a>
      <div class="docs-nav-title">Documentation</div>
      <ul class="docs-nav-list">
        <li><a href="#user_guide" class="doc-link active" data-doc="user_guide">User Guide</a></li>
        <li><a href="#model_provider_config" class="doc-link" data-doc="model_provider_config">Model &amp; Provider Config</a></li>
      </ul>
      <div class="docs-theme-switch">
        <div class="theme-switch" id="theme-switch">
          <button class="theme-btn active" data-theme="auto" aria-label="Auto theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
          </button>
          <button class="theme-btn" data-theme="light" aria-label="Light theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          </button>
          <button class="theme-btn" data-theme="dark" aria-label="Dark theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          </button>
        </div>
      </div>
    </nav>
    <main class="docs-content" id="docs-content">
      <p class="docs-loading">Loading documentation...</p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const docs = {
      user_guide: { file: 'doc/guide/user_guide.md', title: 'User Guide' },
      model_provider_config: { file: 'doc/guide/model_provider_config.md', title: 'Model & Provider Config' }
    };

    const content = document.getElementById('docs-content');
    const links = document.querySelectorAll('.doc-link');

    async function loadDoc(key) {
      const doc = docs[key];
      if (!doc) return;

      // Update active link
      links.forEach(l => l.classList.remove('active'));
      const activeLink = document.querySelector(`[data-doc="${key}"]`);
      if (activeLink) activeLink.classList.add('active');

      // Update title
      document.title = `Rai — ${doc.title}`;

      // Fetch and render — try deployed path first, then local dev path
      content.innerHTML = '<p class="docs-loading">Loading...</p>';
      try {
        let res = await fetch(doc.file);
        if (!res.ok) res = await fetch('../' + doc.file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        content.innerHTML = marked.parse(md);
      } catch (e) {
        content.innerHTML = `<p class="docs-loading">Failed to load ${doc.title}.</p>`;
      }
    }

    // Handle hash navigation
    function onHashChange() {
      const hash = location.hash.slice(1) || 'user_guide';
      loadDoc(hash);
    }

    window.addEventListener('hashchange', onHashChange);

    // Handle link clicks
    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const key = link.dataset.doc;
        history.pushState(null, '', `#${key}`);
        loadDoc(key);
      });
    });

    // Initial load
    onHashChange();

    // === Theme switcher ===
    function getSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function applyTheme(setting) {
      const resolved = setting === 'auto' ? getSystemTheme() : setting;
      document.documentElement.setAttribute('data-theme', resolved);
      localStorage.setItem('theme', setting);
      document.querySelectorAll('.theme-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.theme === setting);
      });
    }

    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (localStorage.getItem('theme') === 'auto') applyTheme('auto');
    });

    applyTheme(localStorage.getItem('theme') || 'auto');
  </script>
</body>
</html>
