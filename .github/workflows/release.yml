name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: x86_64-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            artifact_name: aarch64-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            artifact_name: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            artifact_name: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            artifact_name: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            artifact_name: aarch64-pc-windows-msvc
            os: windows-11-arm
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install cross-compilation deps (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rai-${{ matrix.artifact_name }}.tar.gz rai
          cd ../../..

      - name: Package .deb (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          mkdir -p dpkg/usr/local/bin dpkg/DEBIAN
          cp target/${{ matrix.target }}/release/rai dpkg/usr/local/bin/
          chmod 755 dpkg/usr/local/bin/rai
          VERSION=${GITHUB_REF_NAME#v}
          cat > dpkg/DEBIAN/control <<CTRL
          Package: rai
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: appmakes.io
          Description: Run AI instructions from your terminal
          Homepage: https://appmakes.github.io/Rai/
          CTRL
          sed -i 's/^          //' dpkg/DEBIAN/control
          dpkg-deb --build dpkg rai_${VERSION}_amd64.deb

      - name: Package .deb (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p dpkg/usr/local/bin dpkg/DEBIAN
          cp target/${{ matrix.target }}/release/rai dpkg/usr/local/bin/
          chmod 755 dpkg/usr/local/bin/rai
          VERSION=${GITHUB_REF_NAME#v}
          cat > dpkg/DEBIAN/control <<CTRL
          Package: rai
          Version: ${VERSION}
          Architecture: arm64
          Maintainer: appmakes.io
          Description: Run AI instructions from your terminal
          Homepage: https://appmakes.github.io/Rai/
          CTRL
          sed -i 's/^          //' dpkg/DEBIAN/control
          dpkg-deb --build dpkg rai_${VERSION}_arm64.deb

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/rai.exe" -DestinationPath "rai-${{ matrix.artifact_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rai-${{ matrix.artifact_name }}
          path: |
            rai-${{ matrix.artifact_name }}.${{ matrix.archive }}
            rai_*_*.deb

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' \) -exec sh -c 'sha256sum "$1" >> ../checksums.txt' _ {} \;
          cd ..
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.deb
            checksums.txt

  npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd packaging/npm
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: npm publish ./packaging/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
